<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flowtient workflow wave logo</title>
  <desc id="desc">An F-shaped workflow wave with connected nodes and an upward growth tail.</desc>
  <defs>
    <linearGradient id="ft-bg" x1="8" y1="6" x2="58" y2="61" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.52" stop-color="#080B12"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="ft-wave" x1="14" y1="18" x2="54" y2="51" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0E7FF"/>
      <stop offset="0.42" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <filter id="ft-glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.388 0 0 0 0 0.400 0 0 0 0 0.945 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="17" fill="url(#ft-bg)" stroke="#A5B4FC" stroke-opacity="0.22"/>
  <path d="M19 49V17.8C19 15.7 20.7 14 22.8 14H48" stroke="url(#ft-wave)" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#ft-glow)"/>
  <path d="M20 31.5H42.5" stroke="url(#ft-wave)" stroke-width="5.4" stroke-linecap="round" filter="url(#ft-glow)"/>
  <path d="M34.5 43.4L50.8 54.4" stroke="url(#ft-wave)" stroke-width="5.4" stroke-linecap="round" filter="url(#ft-glow)"/>
  <path d="M44.8 50.9C48.1 49.85 50.8 48.05 53.15 45.5" stroke="#E0E7FF" stroke-width="2.6" stroke-linecap="round" stroke-opacity="0.9"/>
  <path d="M51.15 45.5H53.15V47.5" stroke="#E0E7FF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9"/>

  <circle cx="19" cy="18" r="3.2" fill="#E0E7FF"/>
  <circle cx="33.5" cy="14" r="3.2" fill="#A5B4FC"/>
  <circle cx="48" cy="14" r="3.2" fill="#6366F1"/>
  <circle cx="42.5" cy="31.5" r="3.2" fill="#6366F1"/>
  <circle cx="49.7" cy="52.8" r="2.7" fill="#E0E7FF"/>

  <path d="M21.4 25.2C28.8 23.2 36.1 23.9 43.2 27.3" stroke="#E0E7FF" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.55"/>
  <path d="M21.2 38.3C26.2 40.1 31.4 40.4 36.9 39.2" stroke="#A5B4FC" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.46"/>
</svg>
